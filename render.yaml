services:
  - type: web
    name: salama-data-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: APP_URL
        sync: false